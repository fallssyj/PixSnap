<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Fluent 背景 -->
  <rect width="100" height="100" rx="24" fill="url(#bg)" />

  <!-- 截图框（更柔和） -->
  <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
    <path d="M20 32 L20 20 L32 20" />
    <path d="M68 20 L80 20 L80 32" />
    <path d="M80 68 L80 80 L68 80" />
    <path d="M32 80 L20 80 L20 68" />
  </g>

  <!-- 主体 -->
  <g filter="url(#shadow)">
    <rect x="26" y="26" width="48" height="48" rx="16" fill="url(#card)" />

    <!-- 镜头 -->
    <circle cx="50" cy="50" r="16" fill="url(#lens)" />

    <!-- Pix 像素 -->
    <g>
      <rect x="44" y="44" width="6" height="6" rx="1.8" fill="#60A5FA"/>
      <rect x="50" y="44" width="6" height="6" rx="1.8" fill="#34D399"/>
      <rect x="44" y="50" width="6" height="6" rx="1.8" fill="#FBBF24"/>
      <rect x="50" y="50" width="6" height="6" rx="1.8" fill="#F87171"/>
    </g>

    <!-- ✅ 修复后的快门点（位置 + 风格优化） -->
    <circle cx="64" cy="64" r="4.5" fill="url(#record)" />
  </g>

  <!-- 高光（Fluent 灵魂） -->
  <ellipse cx="40" cy="34" rx="18" ry="10" fill="white" opacity="0.15"/>

  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>

    <!-- Fluent 主卡片 -->
    <linearGradient id="card" x1="26" y1="26" x2="74" y2="74">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>

    <!-- 镜头 -->
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </radialGradient>

    <!-- Fluent 蓝 -->
    <linearGradient id="accent" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- 红点（柔和渐变） -->
    <radialGradient id="record" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </radialGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

</svg>